<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>らくらくシフト</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Round">
</head>
<body>
  <div class="page-shell">
    <div class="app-card">

      <!-- ヘッダー：アカウント選択 -->
      <div class="card-header">
        <div class="header-top-row">
          <h1 class="logo">らくらくシフト</h1>
          <button id="btn-dark-mode" class="icon-button">
            <span class="material-icons-round" id="dark-mode-icon">dark_mode</span>
          </button>
        </div>

        <div class="account-row">
          <label class="account-row-label">
            <span class="material-icons-round">person</span> アカウント
          </label>
          <div class="account-row-controls">
            <div class="select-wrapper">
              <select id="custom-dropdown-btn" class="styled-select"></select>
            </div>
            <button id="btn-edit-account" title="アカウント名を編集" class="icon-button-sm">
              <span class="material-icons-round">edit</span>
            </button>
            <button id="btn-delete-account" title="アカウントを削除" class="icon-button-sm danger">
              <span class="material-icons-round">delete</span>
            </button>
          </div>
        </div>

        <div class="inline-form-row">
          <input type="text" id="new-account-name" placeholder="新しいアカウント名" class="input-line">
          <button id="btn-create-account" class="primary-button-sm">追加</button>
        </div>
      </div>

      <!-- タブ切り替え -->
      <div class="section-tabs">
        <button id="tab-calendar-btn" class="section-tab-btn active">
          <span class="material-icons-round">calendar_month</span> カレンダー &amp; リスト
        </button>
        <button id="tab-parser-btn" class="section-tab-btn">
          <span class="material-icons-round">description</span> テキスト一括入力
        </button>
      </div>

      <!-- カレンダー & リスト -->
      <div id="content-tab-calendar" class="card-body">
        <div id="calendar-title" class="calendar-title-bar">
          <span>2026年 6月</span>
          <div class="segment-control-mini">
            <button id="btn-prev-month" class="icon-button-sm"><span class="material-icons-round">chevron_left</span></button>
            <button id="btn-current-month" class="text-mini-button">今月</button>
            <button id="btn-next-month" class="icon-button-sm"><span class="material-icons-round">chevron_right</span></button>
          </div>
        </div>

        <div class="weekday-row">
          <div class="weekday-sun">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div class="weekday-sat">土</div>
        </div>

        <div id="calendar-grid" class="calendar-grid"></div>

        <div class="summary-card">
          <div id="summary-header" class="summary-label"><span>6月の勤務サマリー</span></div>
          <div class="summary-figures">
            <div class="summary-figure">
              <span class="summary-figure-label">合計回数</span>
              <span id="summary-count" class="summary-figure-value">0回</span>
            </div>
            <div class="summary-figure">
              <span class="summary-figure-label">合計時間</span>
              <span class="summary-figure-value"><span id="summary-hours">0</span>時間</span>
            </div>
          </div>
        </div>

        <div class="section-divider"></div>

        <div class="list-header-row">
          <span id="selected-date-badge" class="pill-badge"></span>
          <button id="btn-add-shift-text" class="add-link-btn">
            <span class="material-icons-round">add</span> シフト追加
          </button>
        </div>

        <div id="shifts-list-container" class="timeline"></div>
      </div>

      <!-- テキスト一括入力 -->
      <div id="content-tab-parser" class="card-body hidden">
        <div class="parser-intro">
          <h4>テキストから一括シフト登録</h4>
          <p>
            略称の文字列フォーマットを解析して一括インプットします。<br>
            書式例: <code>日付, 開始時間, 終了時間;</code> （セミコロンで区切ると複数件連続で登録できます）
          </p>
        </div>

        <textarea id="shorthand-input" placeholder="例: 06/04, 17:30, 23:30; 06/05, 22:00, 29:00" rows="5" class="textarea-line"></textarea>

        <div class="parser-actions">
          <button id="btn-sample" class="secondary-button-sm">サンプルを挿入</button>
          <button id="btn-parse" class="primary-button-sm">
            <span class="material-icons-round">bolt</span> 解析して取り込む
          </button>
        </div>
      </div>

    </div>
  </div>

  <!-- シフト登録モーダル -->
  <div id="modal" class="modal-overlay hidden">
    <div class="modal-content">
      <div id="modal-title" class="modal-header">
        <span>シフト登録フォーム</span>
        <button id="btn-close-modal" class="close-button">閉じる</button>
      </div>

      <div class="modal-body">
        <div class="form-group">
          <label>日付</label>
          <input type="date" id="input-shift-date" class="input-line">
        </div>
        <div class="form-group">
          <label>タイトル / メモ</label>
          <input type="text" id="input-shift-title" placeholder="勤務シフト" class="input-line">
        </div>
        <div class="form-group-row">
          <div class="form-group">
            <label>開始時間</label>
            <input type="text" id="input-shift-start" class="input-line mono-center">
          </div>
          <div class="form-group">
            <label>終了時間</label>
            <input type="text" id="input-shift-end" class="input-line mono-center">
          </div>
        </div>
      </div>

      <div class="modal-footer split">
        <button id="btn-delete-modal" class="text-danger-button hidden">削除</button>
        <button id="btn-save-modal" class="primary-button">保存する</button>
      </div>
    </div>
  </div>

  <!-- アカウント確認ダイアログ（予備UI） -->
  <div id="account-dialog-overlay" class="dialog-overlay hidden">
    <div id="account-dialog-sheet" class="dialog-sheet">
      <div class="dialog-header">
        <div id="account-dialog-icon-bg" class="dialog-icon-bg">
          <span id="account-dialog-icon" class="material-icons-round">warning</span>
        </div>
        <div>
          <h4 id="account-dialog-title">タイトル</h4>
          <p id="account-dialog-desc">説明文</p>
        </div>
      </div>

      <div id="account-dialog-input-wrapper" class="form-group hidden">
        <label>アカウント名</label>
        <input type="text" id="account-dialog-input" class="input-line">
      </div>

      <div class="dialog-actions">
        <button id="btn-account-dialog-cancel" class="secondary-button">いいえ</button>
        <button id="btn-account-dialog-confirm" class="primary-button">はい</button>
      </div>
    </div>
  </div>

  <!-- トースト通知 -->
  <div id="toast" class="toast hidden">
    <span class="material-icons-round toast-icon">info</span>
    <span id="toast-text"></span>
  </div>

  <script src="app.js"></script>
</body>
</html>
