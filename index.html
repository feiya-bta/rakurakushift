<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シフト管理アプリ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 antialiased py-8 px-4">

  <div class="max-w-md mx-auto bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
    
    <div class="p-6 bg-slate-50/50 border-b border-slate-100 space-y-4">
      <div class="flex items-center justify-between gap-4">
        <label class="text-xs font-bold text-slate-500 tracking-wider flex items-center gap-1.5 shrink-0">
          <i data-lucide="user" class="w-3.5 h-3.5 text-[#7d3b5b]"></i> アカウント:
        </label>
        
        <div class="flex items-center gap-1 flex-1 max-w-[220px]">
          <select id="custom-dropdown-btn" class="w-full bg-white border border-slate-200 rounded-xl px-3 py-1.5 text-xs font-medium text-slate-700 shadow-xs hover:border-slate-300 transition-all focus:outline-none focus:ring-2 focus:ring-[#7d3b5b]/20">
          </select>
          
          <button id="btn-edit-account" title="アカウント名を編集" class="p-1.5 text-slate-400 hover:text-slate-700 hover:bg-slate-100 rounded-lg transition-all cursor-pointer shrink-0">
            <i data-lucide="edit-2" class="w-3.5 h-3.5"></i>
          </button>
          
          <button id="btn-delete-account" title="アカウントを削除" class="p-1.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all cursor-pointer shrink-0">
            <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
          </button>
        </div>
      </div>

      <div class="flex gap-2">
        <input type="text" id="new-account-name" placeholder="新しいアカウント名" class="flex-1 bg-white border border-slate-200 rounded-xl px-3 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-[#7d3b5b]/20 focus:border-[#7d3b5b] transition-all">
        <button id="btn-create-account" class="bg-[#7d3b5b] hover:bg-[#682e4a] text-white text-xs font-bold px-4 py-1.5 rounded-xl transition-all shadow-xs cursor-pointer">追加</button>
      </div>
    </div>

    <div class="flex border-b border-slate-100 bg-slate-50/30 p-2 gap-1">
      <button id="tab-calendar-btn" class="flex-1 py-2.5 text-xs font-bold rounded-xl transition-all flex items-center justify-center gap-2 cursor-pointer bg-white text-[#7d3b5b] shadow-xs">
        <i data-lucide="calendar" class="w-3.5 h-3.5"></i> カレンダー & リスト
      </button>
      <button id="tab-parser-btn" class="flex-1 py-2.5 text-xs font-bold rounded-xl transition-all flex items-center justify-center gap-2 cursor-pointer text-slate-500 hover:text-slate-800 hover:bg-white/50">
        <i data-lucide="file-text" class="w-3.5 h-3.5"></i> テキスト一括入力
      </button>
    </div>

    <div id="content-tab-calendar" class="p-6 space-y-6">
      <div id="calendar-title" class="flex items-center justify-between">
        <span class="text-sm font-bold text-slate-800 tracking-tight">2026年 6月</span>
        <div class="flex items-center gap-1 bg-slate-100 p-1 rounded-xl">
          <button id="btn-prev-month" class="p-1.5 hover:bg-white rounded-lg transition-all text-slate-600 cursor-pointer"><i data-lucide="chevron-left" class="w-3.5 h-3.5"></i></button>
          <button id="btn-current-month" class="px-2.5 py-1 text-[11px] font-bold hover:bg-white rounded-lg transition-all text-slate-700 cursor-pointer">今月</button>
          <button id="btn-next-month" class="p-1.5 hover:bg-white rounded-lg transition-all text-slate-600 cursor-pointer"><i data-lucide="chevron-right" class="w-3.5 h-3.5"></i></button>
        </div>
      </div>

      <div class="grid grid-cols-7 gap-1 text-center text-[11px] font-bold text-slate-400">
        <div class="text-red-400">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div class="text-blue-400">土</div>
      </div>

      <div id="calendar-grid" class="grid grid-cols-7 gap-1"></div>

      <div class="bg-slate-50/70 border border-slate-100 rounded-2xl p-4 flex items-center justify-between">
        <div id="summary-header" class="text-xs font-bold text-slate-600"><span>6月の勤務サマリー</span></div>
        <div class="flex gap-4 text-right">
          <div>
            <span class="block text-[10px] text-slate-400 font-medium">合計回数</span>
            <span id="summary-count" class="text-sm font-bold text-slate-800">0回</span>
          </div>
          <div>
            <span class="block text-[10px] text-slate-400 font-medium">合計時間</span>
            <span class="text-sm font-bold text-slate-800"><span id="summary-hours">0</span>時間</span>
          </div>
        </div>
      </div>

      <hr class="border-slate-100">

      <div class="flex items-center justify-between">
        <span id="selected-date-badge" class="bg-[#fcf7f9] text-[#7d3b5b] text-xs font-bold px-3 py-1.5 rounded-xl border border-[#7d3b5b]/10"></span>
        <button id="btn-add-shift-text" class="text-xs font-bold text-[#7d3b5b] hover:text-[#682e4a] flex items-center gap-1 transition-all cursor-pointer">
          <i data-lucide="plus" class="w-3.5 h-3.5"></i> シフト追加
        </button>
      </div>

      <div id="shifts-list-container" class="space-y-2.5"></div>
    </div>

    <div id="content-tab-parser" class="p-6 space-y-4 hidden">
      <div class="space-y-1">
        <h4 class="text-sm font-bold text-slate-800">テキストから一括シフト登録</h4>
        <p class="text-[11px] text-slate-400 leading-relaxed">
          略称の文字列フォーマットを解析して一括インプットします。<br>
          書式例: <code class="bg-slate-100 px-1 py-0.5 rounded font-mono text-[10px] text-slate-600">日付, 開始時間, 終了時間;</code> （セミコロンで区切ると複数件連続で登録できます）
        </p>
      </div>

      <textarea id="shorthand-input" placeholder="例: 06/04, 17:30, 23:30; 06/05, 22:00, 29:00" rows="5" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-3 text-xs font-mono focus:outline-none focus:ring-2 focus:ring-[#7d3b5b]/20 focus:border-[#7d3b5b] transition-all resize-none"></textarea>
      
      <div class="flex items-center justify-end gap-2">
        <button id="btn-sample" class="border border-slate-200 hover:bg-slate-50 text-slate-600 text-xs font-medium px-4 py-2 rounded-xl transition-all cursor-pointer">サンプルを挿入</button>
        <button id="btn-parse" class="bg-[#7d3b5b] hover:bg-[#682e4a] text-white text-xs font-bold px-5 py-2 rounded-xl transition-all shadow-md flex items-center gap-1.5 cursor-pointer">
          <i data-lucide="zap" class="w-3.5 h-3.5"></i> 解析して取り込む
        </button>
      </div>
    </div>

  </div>

  <div id="modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-xs flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl border border-slate-100 space-y-4">
      <div id="modal-title" class="flex items-center justify-between border-b border-slate-100 pb-3">
        <span class="text-sm font-bold text-slate-800">シフト登録フォーム</span>
        <button id="btn-close-modal" class="text-slate-400 hover:text-slate-600 p-1 cursor-pointer"><i data-lucide="x" class="w-4 h-4"></i></button>
      </div>
      
      <div class="space-y-3">
        <div>
          <label class="block text-[10px] font-bold text-slate-400 mb-1">日付</label>
          <input type="date" id="input-shift-date" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs focus:outline-none">
        </div>
        <div>
          <label class="block text-[10px] font-bold text-slate-400 mb-1">タイトル / メモ</label>
          <input type="text" id="input-shift-title" placeholder="勤務シフト" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs focus:outline-none">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-[10px] font-bold text-slate-400 mb-1">開始時間</label>
            <input type="text" id="input-shift-start" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs font-mono text-center focus:outline-none">
          </div>
          <div>
            <label class="block text-[10px] font-bold text-slate-400 mb-1">終了時間</label>
            <input type="text" id="input-shift-end" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs font-mono text-center focus:outline-none">
          </div>
        </div>
      </div>

      <div class="flex items-center justify-between gap-2 pt-2">
        <button id="btn-delete-modal" class="bg-red-50 hover:bg-red-100 text-red-600 text-xs font-bold px-4 py-2 rounded-xl transition-all cursor-pointer">削除</button>
        <div class="flex items-center gap-2 ml-auto">
          <button id="btn-save-modal" class="bg-[#7d3b5b] hover:bg-[#682e4a] text-white text-xs font-bold px-5 py-2 rounded-xl transition-all shadow-xs cursor-pointer">保存する</button>
        </div>
      </div>
    </div>
  </div>

  <div id="account-dialog-overlay" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-xs flex items-end justify-center p-4 z-50 transition-all duration-300 opacity-0">
    <div id="account-dialog-sheet" class="bg-white rounded-t-3xl rounded-b-xl w-full max-w-md p-6 shadow-2xl border border-slate-100 space-y-4 translate-y-10 transition-all duration-300">
      
      <div class="flex items-center gap-2.5 border-b border-slate-100 pb-3">
        <div id="account-dialog-icon-bg" class="p-2 rounded-xl bg-amber-50 border border-amber-200">
          <i id="account-dialog-icon" data-lucide="alert-triangle" class="w-4 h-4 text-amber-600"></i>
        </div>
        <div>
          <h4 id="account-dialog-title" class="text-xs font-bold text-slate-800 tracking-tight">タイトル</h4>
          <p id="account-dialog-desc" class="text-[10px] text-slate-400 mt-0.5">説明文</p>
        </div>
      </div>
      
      <div id="account-dialog-input-wrapper" class="hidden">
        <label class="block text-[10px] font-bold text-slate-400 mb-1.5">アカウント名</label>
        <input type="text" id="account-dialog-input" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs focus:outline-none focus:ring-2 focus:ring-[#7d3b5b]/20 focus:border-[#7d3b5b] transition-all">
      </div>

      <div class="flex items-center justify-end gap-2 pt-2">
        <button id="btn-account-dialog-cancel" class="flex-1 sm:flex-initial bg-slate-50 hover:bg-slate-100 text-slate-600 text-xs font-bold px-4 py-2.5 rounded-xl transition-all cursor-pointer">
          いいえ
        </button>
        <button id="btn-account-dialog-confirm" class="flex-1 sm:flex-initial bg-[#7d3b5b] hover:bg-[#682e4a] text-white text-xs font-bold px-5 py-2.5 rounded-xl transition-all shadow-xs cursor-pointer">
          はい
        </button>
      </div>
    </div>
  </div>

  <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white text-xs px-4 py-2.5 rounded-xl shadow-xl transition-all duration-300 opacity-0 flex items-center gap-2 z-50">
    <i data-lucide="info" class="w-4 h-4 text-amber-300"></i>
    <span id="toast-text"></span>
  </div>

  <script src="app.js"></script>
</body>
</html>
